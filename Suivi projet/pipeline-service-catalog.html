<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline — Service Catalog EMS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 24px 16px; }
  .container { max-width: 780px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  header h1 { font-size: 20px; font-weight: 600; color: #1a1a18; margin-bottom: 4px; }
  header p { font-size: 13px; color: #73726c; }
  .summary { display: flex; gap: 10px; margin-bottom: 20px; }
  .sum-card { flex: 1; background: #fff; border: 0.5px solid #dddcd6; border-radius: 10px; padding: 12px 14px; }
  .sum-val { font-size: 24px; font-weight: 600; color: #1a1a18; }
  .sum-lbl { font-size: 11px; color: #9c9a92; margin-top: 2px; }
  .global-bar { background: #e8e7e2; border-radius: 4px; height: 6px; margin-bottom: 20px; overflow: hidden; }
  .global-fill { height: 100%; background: #1D9E75; border-radius: 4px; transition: width 0.4s; width: 0%; }
  .phases { display: flex; flex-direction: column; gap: 10px; }
  .phase { background: #fff; border: 0.5px solid #dddcd6; border-radius: 12px; overflow: hidden; }
  .phase-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .phase-header:hover { background: #f9f8f4; }
  .phase-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .phase-title { font-size: 14px; font-weight: 500; flex: 1; }
  .phase-meta { font-size: 11px; color: #9c9a92; white-space: nowrap; }
  .phase-chevron { width: 16px; height: 16px; color: #9c9a92; transition: transform 0.2s; flex-shrink: 0; }
  .phase-chevron.open { transform: rotate(90deg); }
  .phase-body { display: none; }
  .phase-body.open { display: block; }
  .progress-bar { height: 3px; background: #f0efea; margin: 0 16px 10px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; width: 0%; }
  .tasks { padding: 0 16px 14px; display: flex; flex-direction: column; gap: 6px; }
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 9px 11px; border-radius: 8px; border: 0.5px solid #dddcd6; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .task:hover { border-color: #b4b2a9; background: #faf9f6; }
  .task.done { opacity: 0.5; }
  .task-check { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid #b4b2a9; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
  .task.done .task-check { background: #1D9E75; border-color: #1D9E75; }
  .checkmark { display: none; width: 9px; height: 6px; border: 2px solid #fff; border-top: none; border-right: none; transform: rotate(-45deg) translate(1px, -1px); }
  .task.done .checkmark { display: block; }
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; font-weight: 500; color: #1a1a18; line-height: 1.4; }
  .task.done .task-name { text-decoration: line-through; color: #9c9a92; }
  .task-desc { font-size: 11px; color: #9c9a92; margin-top: 3px; line-height: 1.5; }
  .task-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .reset-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 0.5px solid #dddcd6; background: #fff; color: #5F5E5A; cursor: pointer; margin-top: 4px; }
  .reset-btn:hover { background: #f5f4f0; }
  footer { margin-top: 24px; text-align: center; font-size: 11px; color: #b4b2a9; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Pipeline — Service Catalog EMS</h1>
    <p>Cochez les tâches au fur et à mesure de votre avancement. La progression est sauvegardée automatiquement.</p>
  </header>

  <div class="summary">
    <div class="sum-card"><div class="sum-val" id="s-done">0</div><div class="sum-lbl">Tâches complétées</div></div>
    <div class="sum-card"><div class="sum-val" id="s-total">0</div><div class="sum-lbl">Tâches totales</div></div>
    <div class="sum-card"><div class="sum-val" id="s-pct">0%</div><div class="sum-lbl">Avancement global</div></div>
  </div>
  <div class="global-bar"><div class="global-fill" id="global-fill"></div></div>

  <div class="phases" id="phases"></div>

  <div style="margin-top: 16px; display: flex; justify-content: flex-end;">
    <button class="reset-btn" onclick="resetAll()">↺ Réinitialiser la progression</button>
  </div>

  <footer>Service Catalog EMS &nbsp;·&nbsp; DocBizarre/Service-Catalog-EMS</footer>
</div>

<script>
const PHASES = [
  { id:1, title:"Initialisation du projet", est:"~2h", numBg:"#185FA5", fillColor:"#378ADD", open:true, tasks:[
    { id:"1a", name:"Créer le dépôt Git", desc:"Initialiser le repo, ajouter .gitignore, README et structure de dossiers (frontend/, backend/, docs/)", tag:"Git", tagBg:"#E6F1FB", tagColor:"#0C447C" },
    { id:"1b", name:"Définir la structure de dossiers", desc:"frontend/ · backend/ · docs/ · scripts/", tag:"Architecture", tagBg:"#EEEDFE", tagColor:"#3C3489" },
    { id:"1c", name:"Configurer l'environnement local", desc:"Node.js + npm, Python + venv ou Docker Compose selon votre stack", tag:"Env", tagBg:"#EAF3DE", tagColor:"#27500A" },
    { id:"1d", name:"Choisir la stack backend", desc:"Node.js (Express) ou Python (FastAPI) — à décider selon vos préférences", tag:"Décision", tagBg:"#FAEEDA", tagColor:"#633806" },
  ]},
  { id:2, title:"Base de données & modèle de données", est:"~3h", numBg:"#534AB7", fillColor:"#7F77DD", open:false, tasks:[
    { id:"2a", name:"Concevoir le schéma SQLite", desc:"Tables : apps, users, roles, permissions, favorites, audit_log", tag:"BDD", tagBg:"#EEEDFE", tagColor:"#3C3489" },
    { id:"2b", name:"Créer le script d'initialisation", desc:"init_db.sql ou migration ORM — crée les tables et insère des données de démo", tag:"SQL", tagBg:"#E6F1FB", tagColor:"#0C447C" },
    { id:"2c", name:"Documenter le schéma", desc:"Diagramme ERD + description des champs dans docs/database.md", tag:"Docs", tagBg:"#EAF3DE", tagColor:"#27500A" },
  ]},
  { id:3, title:"Backend — API REST", est:"~6h", numBg:"#0F6E56", fillColor:"#1D9E75", open:false, tasks:[
    { id:"3a", name:"Authentification & sessions", desc:"Système de login (local ou SSO/LDAP), gestion des sessions, middleware d'auth", tag:"Auth", tagBg:"#FAECE7", tagColor:"#712B13" },
    { id:"3b", name:"Route GET /api/apps", desc:"Retourne uniquement les apps autorisées pour l'utilisateur connecté — filtrage côté serveur", tag:"RBAC", tagBg:"#FAEEDA", tagColor:"#633806" },
    { id:"3c", name:"Routes CRUD admin", desc:"POST /api/apps · PUT /api/apps/:id · DELETE · gestion des droits par groupe", tag:"Admin", tagBg:"#EEEDFE", tagColor:"#3C3489" },
    { id:"3d", name:"Route favoris", desc:"POST/DELETE /api/favorites — épinglage par utilisateur persisté en BDD", tag:"Favoris", tagBg:"#E1F5EE", tagColor:"#085041" },
    { id:"3e", name:"Contrôle de statut des apps", desc:"Endpoint ou job qui pinge les URLs et met à jour le statut online/offline", tag:"Monitoring", tagBg:"#FCEBEB", tagColor:"#791F1F" },
    { id:"3f", name:"Audit log", desc:"Journalisation des connexions et accès dans la table audit_log", tag:"Sécu", tagBg:"#FAECE7", tagColor:"#712B13" },
  ]},
  { id:4, title:"Frontend — intégration avec votre système", est:"~4h", numBg:"#854F0B", fillColor:"#EF9F27", open:false, tasks:[
    { id:"4a", name:"Connecter le frontend au backend", desc:"Remplacer les données statiques du prototype par des appels fetch() à votre API", tag:"API", tagBg:"#E6F1FB", tagColor:"#0C447C" },
    { id:"4b", name:"Gérer les sessions côté frontend", desc:"Afficher les bons onglets selon le rôle retourné par l'API, rediriger si non connecté", tag:"RBAC", tagBg:"#FAEEDA", tagColor:"#633806" },
    { id:"4c", name:"Persistance des favoris", desc:"Synchroniser les favoris avec le backend au clic (optimistic UI)", tag:"UX", tagBg:"#EAF3DE", tagColor:"#27500A" },
    { id:"4d", name:"Responsive & accessibilité", desc:"Tester sur mobile/tablette, vérifier les contrastes et la navigation clavier", tag:"UI", tagBg:"#EEEDFE", tagColor:"#3C3489" },
  ]},
  { id:5, title:"Déploiement & livraison", est:"~3h", numBg:"#3B6D11", fillColor:"#639922", open:false, tasks:[
    { id:"5a", name:"Configurer HTTPS", desc:"Certificat SSL (Let's Encrypt ou interne), reverse proxy Nginx/Caddy", tag:"Sécu", tagBg:"#FAECE7", tagColor:"#712B13" },
    { id:"5b", name:"Variables d'environnement", desc:".env pour secrets, URL BDD, config SMTP — ne jamais committer", tag:"Config", tagBg:"#FAEEDA", tagColor:"#633806" },
    { id:"5c", name:"Tests de bout en bout", desc:"Vérifier chaque rôle, chaque route protégée, le filtrage serveur et les cas d'erreur", tag:"QA", tagBg:"#E6F1FB", tagColor:"#0C447C" },
    { id:"5d", name:"Documentation d'administration", desc:"Guide d'ajout d'une app, gestion des droits, procédure de backup SQLite", tag:"Docs", tagBg:"#EAF3DE", tagColor:"#27500A" },
    { id:"5e", name:"Mise en production", desc:"Déploiement sur votre serveur, configuration du démarrage automatique (systemd/PM2)", tag:"Deploy", tagBg:"#EEEDFE", tagColor:"#3C3489" },
  ]},
];

const STORAGE_KEY = 'service-catalog-pipeline-done';
let done = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let openPhases = new Set([1]);

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...done])); }

function totalTasks() { return PHASES.reduce((s, p) => s + p.tasks.length, 0); }

function updateSummary() {
  const t = totalTasks(), d = done.size, pct = t ? Math.round(d / t * 100) : 0;
  document.getElementById('s-done').textContent = d;
  document.getElementById('s-total').textContent = t;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('global-fill').style.width = pct + '%';
}

function updateProgress() {
  PHASES.forEach(p => {
    const d = p.tasks.filter(t => done.has(t.id)).length;
    const pct = p.tasks.length ? Math.round(d / p.tasks.length * 100) : 0;
    const bar = document.getElementById('bar-' + p.id);
    if (bar) { bar.style.width = pct + '%'; bar.style.background = p.fillColor; }
  });
  updateSummary();
}

function toggleTask(id) {
  if (done.has(id)) done.delete(id); else done.add(id);
  const el = document.querySelector('.task[data-id="' + id + '"]');
  if (el) el.classList.toggle('done', done.has(id));
  save();
  updateProgress();
}

function togglePhase(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function resetAll() {
  if (!confirm('Réinitialiser toute la progression ?')) return;
  done.clear();
  save();
  document.querySelectorAll('.task').forEach(el => el.classList.remove('done'));
  updateProgress();
}

function render() {
  const container = document.getElementById('phases');
  container.innerHTML = PHASES.map(p => {
    const isOpen = openPhases.has(p.id);
    const tasks = p.tasks.map(t => `
      <div class="task${done.has(t.id) ? ' done' : ''}" data-id="${t.id}" onclick="toggleTask('${t.id}')">
        <div class="task-check"><div class="checkmark"></div></div>
        <div class="task-body">
          <div class="task-name">${t.name}</div>
          <div class="task-desc">${t.desc}</div>
        </div>
        <span class="task-tag" style="background:${t.tagBg};color:${t.tagColor}">${t.tag}</span>
      </div>`).join('');
    return `
      <div class="phase">
        <div class="phase-header" onclick="togglePhase(${p.id})">
          <div class="phase-num" style="background:${p.numBg};color:#fff">${p.id}</div>
          <div class="phase-title">${p.title}</div>
          <div class="phase-meta">${p.est} &nbsp;·&nbsp; ${p.tasks.length} tâches</div>
          <svg class="phase-chevron${isOpen ? ' open' : ''}" id="chev-${p.id}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg>
        </div>
        <div class="phase-body${isOpen ? ' open' : ''}" id="body-${p.id}">
          <div class="progress-bar"><div class="progress-fill" id="bar-${p.id}"></div></div>
          <div class="tasks">${tasks}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('s-total').textContent = totalTasks();
  updateProgress();
}

render();
</script>
</body>
</html>
